name: CI

on:
  push:
  pull_request:

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure model artifacts are present
        run: git lfs pull

      - name: Prepare env file
        run: cp .env.example .env

      - name: Reset Docker stack
        run: docker compose down -v --remove-orphans

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker stack
        run: docker compose build

      - name: Run database migrations
        run: docker compose run -T --rm migrate

      - name: Run lint in Docker
        run: docker compose run -T --rm inference-worker ruff check app tests

      - name: Run hardcoded secret scan
        run: docker compose run -T --rm inference-worker python scripts/check_no_hardcoded_secrets.py

      - name: Run backend non-e2e tests in Docker
        run: |
          docker compose run \
            -T \
            -e REQUIRE_VAULT=false \
            -e SEED_DEMO_USERS=false \
            --rm inference-worker \
            python -m pytest --ignore=tests/e2e

      - name: Run classifier tests in Docker
        run: |
          docker compose run -T --rm inference-worker \
            python -m pytest --noconftest tests/classifier

      - name: Run golden replay in Docker
        run: |
          docker compose run -T --rm inference-worker \
            python app/classifier/eval/golden.py

      - name: Run live full-stack smoke workflow
        run: python3 tests/e2e/test_full_stack_workflow.py

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v --remove-orphans
