name: CI

on:
  push:
  pull_request:

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure model artifacts are present
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Aya files
        run: |
          python -m py_compile app/core/config.py
          python -m py_compile app/core/startup.py
          python -m py_compile app/infra/blob/minio_client.py
          python -m py_compile app/infra/queue/redis_client.py
          python -m py_compile app/infra/queue/rq_queue.py
          python -m py_compile app/infra/queue/rq_client.py
          python -m py_compile app/infra/cache/redis_cache.py
          python -m py_compile app/infra/vault/vault_client.py
          python -m py_compile app/infra/sftp/client.py
          python -m py_compile app/infra/sftp/watcher.py
          python -m py_compile app/infra/logging/logger.py
          python -m py_compile app/workers/sftp_ingest_worker.py

      - name: Run smoke tests
        run: pytest tests/smoke

      - name: Run classifier tests
        run: pytest --noconftest tests/classifier

      - name: Run golden replay
        run: python app/classifier/eval/golden.py
