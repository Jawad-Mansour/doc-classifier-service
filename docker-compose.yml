services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-documents}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-documents}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  sftp:
    image: atmoz/sftp
    ports:
      - "2222:22"
    command: ${SFTP_USERNAME:-test}:${SFTP_PASSWORD:-test}:1001::upload,processed

  vault:
    image: hashicorp/vault
    entrypoint: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_DISABLE_MLOCK: "true"
    ports:
      - "8200:8200"
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: &app_env
      APP_NAME: ${APP_NAME:-Document Classifier Service}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-true}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-app}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://app:app@postgres:5432/documents}
      DATABASE_SYNC_URL: ${DATABASE_SYNC_URL:-postgresql+psycopg2://app:app@postgres:5432/documents}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_NAME: ${QUEUE_NAME:-default}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      SFTP_HOST: ${SFTP_HOST:-sftp}
      SFTP_PORT: ${SFTP_PORT:-22}
      SFTP_USERNAME: ${SFTP_USERNAME:-test}
      SFTP_PASSWORD: ${SFTP_PASSWORD:-test}
      SFTP_REMOTE_FOLDER: ${SFTP_REMOTE_FOLDER:-/upload}
      SFTP_PROCESSED_FOLDER: ${SFTP_PROCESSED_FOLDER:-/processed}
      VAULT_URL: ${VAULT_URL:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      REQUIRE_VAULT: ${REQUIRE_VAULT:-true}
      VAULT_SECRET_BASE_PATH: ${VAULT_SECRET_BASE_PATH:-secret/data/doc-classifier}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-for-docker-local-minimum-32}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key-for-local-demo-minimum-32}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-true}
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@example.com}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-Admin123!}
      DEMO_REVIEWER_EMAIL: ${DEMO_REVIEWER_EMAIL:-reviewer@example.com}
      DEMO_REVIEWER_PASSWORD: ${DEMO_REVIEWER_PASSWORD:-Reviewer123!}
      DEMO_AUDITOR_EMAIL: ${DEMO_AUDITOR_EMAIL:-auditor@example.com}
      DEMO_AUDITOR_PASSWORD: ${DEMO_AUDITOR_PASSWORD:-Auditor123!}
    ports:
      - "8080:8000"
    volumes:
      - .:/app

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment: *app_env
    command: alembic upgrade head
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api
    environment:
      - VITE_API_BASE=/api/v1
      - VITE_API_PROXY_TARGET=http://api:8000

  sftp-ingest-worker:
    build:
      context: .
      dockerfile: docker/ingest.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      sftp:
        condition: service_started
    environment: *app_env
    volumes:
      - .:/app

  inference-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *app_env
    command: rq worker default --url redis://redis:6379/0
    volumes:
      - .:/app
